<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <main class="container">
        <h1>Check Payment</h1>

        <form id="checkForm">

            <div class="mb-3">
                <label for="name" class="form-label">Name of the Check:</label>
                <input type="text" class="form-control" name="name" id="name" pattern=".{6,}"
                    title="Must be a Name with at least 6 characters" required>
            </div>

            <div class="mb-3">
                <label for="date" class="form-label">Date:</label>
                <input type="date" class="form-control" name="date" id="date" title="Must be a future date" required>
            </div>

            <div class=" mb-3">
                <label for="amount" class="form-label">Amount:</label>
                <input type="number" class="form-control" name="amount" id="amount" step="0.01" min="0.01"
                    title="Must be a number greater than 0" required>
            </div>

            <div class="mb-3">
                <label for="bank" class="form-label">Bank:</label>
                <input type="text" class="form-control" name="bank" id="bank" pattern=".{5,}"
                    title="Must be a Name with at least 5 characters" required>
            </div>

            <div class=" mb-3">
                <label for="account" class="form-label">Account Number:</label>
                <input type="text" class="form-control" name="account" id="account" pattern="\d{10}"
                    title="Must be a 10 digit code" required>
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </main>

    <script>
        document.getElementById("date").addEventListener("blur", () => {
            const input = document.getElementById("date");
            const selectedDate = new Date(input.value);
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            if (!input.value || selectedDate <= today) {
                input.setCustomValidity("Date must be in the future.");
                input.reportValidity();
            } else {
                input.setCustomValidity("");
            }
        });
    </script>

</body>

</html>
