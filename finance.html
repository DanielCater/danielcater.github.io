<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <main class="container">
        <h1>Add Income</h1>

        <form id="financeForm">

            <div class="mb-3">
                <label for="source" class="form-label">Income Source Name:</label>
                <input type="text" class="form-control" name="source" id="source" pattern=".{3,}"
                    title="Must be a Name with at least 3 characters" required>
            </div>

            <div class="mb-3">
                <label for="amount" class="form-label">Amount:</label>
                <input type="number" class="form-control" name="amount" id="amount" step="0.01" min="0.01"
                    title="Value must be greater than 0 and have two decimals" required>
            </div>

            <div class=" mb-3">
                <label for="frequency" class="form-label">Frequency</label>
                <select name="frequency" class="form-select" id="frequency">
                    <option value="oneTime">One Time</option>
                    <option value="bi-weekly">Bi-weekly</option>
                    <option value="monthly">Monthly</option>
                    <option value="yearly">Yearly</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </main>

    <script>
        document.getElementById("amount").addEventListener("blur", () => {
            let number = document.getElementById("amount").value;
            number = parseFloat(number);
            number = number.toFixed(2);
            document.getElementById("amount").value = number;
        });

    </script>

</body>

</html>
