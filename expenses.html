<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <main class="container">
        <h1>Add Expenses</h1>

        <form id="expenseForm">

            <div class="mb-3">
                <label for="place" class="form-label">Place of Expense:</label>
                <input type="text" class="form-control" name="place" id="place" pattern=".{5,}"
                    title="Must be a Place with at least 5 characters" required>
            </div>

            <div class="mb-3">
                <label for="date" class="form-label">Date:</label>
                <input type="date" class="form-control" name="date" id="date" max="2026-03-11"
                    title="Must be a valid date" required>
            </div>

            <div class="mb-3">
                <label for="amount" class="form-label">Amount:</label>
                <input type="text" min="0.01" max="50000.00" class="form-control" pattern="^-?\d*\.\d{2}$" name="amount" id="amount"
                    title="Must be a valid date" required>
            </div>

            <div class="mb-3">
                <p class="form-label">Catagory:</p>
                <input type="checkbox" name="groceries" id="groceries" class="form-check-input">
                <label for="groceries" class="form-check-label">Groceries</label>
                <input type="checkbox" name="business" id="business" class="form-check-input">
                <label for="business" class="form-check-label">Business</label>
                <input type="checkbox" name="restaurant" id="restaurant" class="form-check-input">
                <label for="restaurant" class="form-check-label">Restaurant</label>
                <input type="checkbox" name="fun" id="fun" class="form-check-input">
                <label for="fun" class="form-check-label">Fun</label>
                
            </div>

            <div class=" mb-3">
                <label for="mode" class="form-label">Mode of Payment</label>
                <select name="mode" class="form-select" id="mode" required>
                    <option value="credit">Credit</option>
                    <option value="debit">Debit</option>
                    <option value="cash">Cash</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="rational" class="form-label">Rational:</label>
                <input type="text" maxlength="100" class="form-control">
            </div>

            <button type="submit" id="submit" class="btn btn-primary">Submit</button>
        </form>
    </main>

    <script>
        let form = document.getElementById("expenseForm");
        form.addEventListener("submit", function(event) {
            let checkboxes = document.querySelectorAll("input[type=checkbox]");
            let checkedOne = Array.from(checkboxes).some(item => item.checked)

            if(!checkedOne){
                event.preventDefault();
                alert("At least one catagory must be checked.")
            }
        });

        let date = new Date();
        
    </script>

</body>
</html>
